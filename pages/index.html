<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习题库 - 登录</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="brand">
          <span class="brand-mark">学</span>
          <div>
            <h1>学习题库</h1>
            <p>登录后同步练习进度、错题和考试记录</p>
          </div>
        </div>

        <form id="loginForm" class="form-card" novalidate>
          <label>
            邮箱
            <input id="email" type="email" autocomplete="email" placeholder="name@example.com" required />
          </label>
          <label>
            密码
            <input id="password" type="password" autocomplete="current-password" minlength="6" placeholder="至少 6 位" required />
          </label>
          <div id="message" class="message" role="status" aria-live="polite"></div>
          <button id="loginButton" type="submit">登录 / 注册</button>
        </form>
      </section>
    </main>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
